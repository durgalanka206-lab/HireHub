<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>HireHub — Career Portal</title>
    <style>
        /* GLOBAL RESET + CUSTOM SELECT FIX — NO DOUBLE ARROWS */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: default;
        }

        a, button, select, [role="button"], label[for] {
            cursor: pointer;
        }

        input, textarea {
            cursor: text;
        }

        body {
            background: #0a0a14;
            color: #e8e0d0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        /* ========== GLOBAL SELECT OVERRIDE — KILL NATIVE ARROWS, USE CLEAN CUSTOM SVG ========== */
        select {
            appearance: none !important;
            -webkit-appearance: none !important;
            -moz-appearance: none !important;

            background-color: #0f0f1a !important;
            
            /* IMPORTANT: only ONE background-image (our chevron) — remove any browser default */
            background-image: url("data:image/svg+xml;utf8,<svg fill='%23c9a84c' height='16' viewBox='0 0 24 24' width='16' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>") !important;
            background-repeat: no-repeat !important;
            background-position: right 14px center !important;
            background-size: 14px !important;

            padding-right: 40px !important;
            padding-left: 12px !important;
            
            border: 1px solid #2a2a3e;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            color: #c9a84c;
            cursor: pointer;
        }

        /* Ensure no extra arrow in Firefox (already handled) and Edge */
        select::-ms-expand {
            display: none !important;
        }

        /* For any inline style overrides — keep consistent */
        .admin-select, .job-filter-select, .sort-select {
            appearance: none !important;
            -webkit-appearance: none !important;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%23c9a84c' height='16' viewBox='0 0 24 24' width='16' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>") !important;
            background-repeat: no-repeat !important;
            background-position: right 14px center !important;
            background-size: 14px !important;
        }

        /* Scrollbar dark theme */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f0f1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #2a2a3e;
            border-radius: 8px;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
    window.pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";
</script>

<script type="module">
    import React, { useState, useRef, useCallback, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';

    const API = "http://localhost:5000/api";

    const SKILL_KEYWORDS = [
        "java","python","javascript","typescript","react","angular","vue","node","nodejs",
        "spring","springboot","spring boot","sql","mysql","postgresql","mongodb","html","css","git",
        "docker","kubernetes","aws","azure","gcp","rest","api","graphql","redux",
        "nlp","machine learning","deep learning","tensorflow","pytorch","pandas",
        "numpy","flask","django","express","tailwind","bootstrap","linux","bash",
        "postman","jira","agile","scrum","ci/cd","devops","microservices","redis",
        "firebase","supabase","vite","webpack","jest","testing","selenium","jenkins",
        "c++","c#","rust","go","kotlin","swift","php","laravel","ruby","rails",
        "debugging","backend","frontend","full stack","algorithms","data structures","oops","oop",
        "markdown","swagger","github","technical writing","api documentation","developer empathy",
    ];

    const convertToLPA = (salaryStr) => {
        if (!salaryStr) return "Not specified";
        const matches = salaryStr.match(/\$(\d+)K/g);
        if (!matches || matches.length < 2) return salaryStr;
        const min = parseInt(matches[0].replace("$","").replace("K",""));
        const max = parseInt(matches[1].replace("$","").replace("K",""));
        const minLPA = Math.round(min * 83 / 100);
        const maxLPA = Math.round(max * 83 / 100);
        return `₹${minLPA} – ₹${maxLPA} LPA`;
    };

    const matchColor = (pct) => {
        if (pct >= 70) return "#10b981";
        if (pct >= 40) return "#f59e0b";
        return "#ef4444";
    };

    const statusStyles = {
        applied:     { bg:"rgba(96,165,250,.12)",  color:"#60a5fa", dot:"#60a5fa", label:"Applied" },
        reviewing:   { bg:"rgba(251,191,36,.12)",  color:"#fbbf24", dot:"#fbbf24", label:"Reviewing" },
        shortlisted: { bg:"rgba(74,222,128,.12)",  color:"#4ade80", dot:"#4ade80", label:"Shortlisted" },
        rejected:    { bg:"rgba(248,113,113,.12)", color:"#f87171", dot:"#f87171", label:"Rejected" },
    };

    const S = {
        app:        { minHeight:"100vh", background:"#0a0a14", color:"#e8e0d0", fontFamily:"'DM Sans',sans-serif" },
        card:       { background:"#13131f", border:"1px solid #2a2a3e", borderRadius:14 },
        input:      { width:"100%", background:"#0f0f1a", border:"1px solid #2a2a3e", borderRadius:8, padding:"11px 14px", color:"#e8e0d0", fontSize:14, outline:"none", boxSizing:"border-box" },
        btn:        { background:"linear-gradient(135deg,#c9a84c,#a07830)", color:"#0a0a14", border:"none", borderRadius:8, padding:"11px 22px", fontWeight:700, cursor:"pointer", fontSize:14, letterSpacing:0.5, fontFamily:"'DM Sans',sans-serif" },
        btnOutline: { background:"transparent", color:"#c9a84c", border:"1px solid #c9a84c", borderRadius:8, padding:"10px 22px", fontWeight:600, cursor:"pointer", fontSize:14, fontFamily:"'DM Sans',sans-serif" },
        label:      { fontSize:12, color:"#888", fontWeight:600, letterSpacing:1, textTransform:"uppercase", marginBottom:6, display:"block" },
        tag:        { background:"#1a1a2e", border:"1px solid #2a2a3e", borderRadius:20, padding:"3px 10px", fontSize:12, color:"#c9a84c" },
    };

    // ---------- Helper Components ----------
    function EyeIcon({ show }) {
        return show ? (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2">
                <path d="M17.94 17.94A10.07 10.07 0 0112 20c-7 0-11-8-11-8a18.45 18.45 0 015.06-5.94"/>
                <path d="M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 8 11 8a18.5 18.5 0 01-2.16 3.19"/>
                <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
        ) : (
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#888" strokeWidth="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
            </svg>
        );
    }

    function PasswordInput({ value, onChange, onKeyDown, placeholder }) {
        const [show, setShow] = useState(false);
        return (
            <div style={{ position:"relative", width:"100%" }}>
                <input style={{ ...S.input, paddingRight:42 }} type={show?"text":"password"}
                       placeholder={placeholder||"••••••••"} value={value} onChange={onChange} onKeyDown={onKeyDown} />
                <span onClick={() => setShow(s => !s)}
                      style={{ position:"absolute", right:13, top:"11px", cursor:"pointer", lineHeight:0 }}>
                    <EyeIcon show={show} />
                </span>
            </div>
        );
    }

    function PasswordStrength({ password }) {
        if (!password) return null;
        const hasUpper = /[A-Z]/.test(password), hasLower = /[a-z]/.test(password);
        const hasNum = /[0-9]/.test(password), hasSpec = /[!@#$%^&*()_+\-=[\]{};':"\\|,.<>\/?]/.test(password);
        const long = password.length >= 8;
        const score = [hasUpper,hasLower,hasNum,hasSpec,long].filter(Boolean).length;
        const label = score<=2?"Weak":score<=3?"Fair":score===4?"Good":"Strong";
        const color = score<=2?"#f87171":score<=3?"#fbbf24":score===4?"#60a5fa":"#4ade80";
        return (
            <div style={{ marginTop:6 }}>
                <div style={{ height:3, background:"#1e1e30", borderRadius:2, overflow:"hidden" }}>
                    <div style={{ height:"100%", width:`${score*20}%`, background:color, transition:"width .3s,background .3s" }} />
                </div>
                <p style={{ margin:"3px 0 0", fontSize:10, color }}>{label}{!long?" — min 8 chars":!hasUpper?" — add uppercase":!hasSpec?" — add special char (!@#…)":""}</p>
            </div>
        );
    }

    // ----- Confirm Modal -----
    function ConfirmModal({ open, title, message, onConfirm, onCancel, danger = true }) {
        if (!open) return null;
        return (
            <div style={{ position:"fixed", inset:0, background:"rgba(0,0,0,0.75)", display:"flex", alignItems:"center", justifyContent:"center", zIndex:2000, padding:20 }}>
                <div style={{ background:"#13131f", border:"1px solid #2a2a3e", borderRadius:16, padding:"28px 32px", maxWidth:420, width:"100%" }}>
                    <h3 style={{ margin:"0 0 10px", color:"#e8e0d0", fontSize:17, fontFamily:"'DM Sans',sans-serif" }}>{title}</h3>
                    <p style={{ margin:"0 0 24px", color:"#888", fontSize:14, lineHeight:1.6 }}>{message}</p>
                    <div style={{ display:"flex", gap:10, justifyContent:"flex-end" }}>
                        <button onClick={onCancel} style={{ padding:"9px 20px", background:"transparent", border:"1px solid #2a2a3e", borderRadius:8, color:"#888", cursor:"pointer", fontSize:13, fontFamily:"'DM Sans',sans-serif" }}>Cancel</button>
                        <button onClick={onConfirm} style={{ padding:"9px 20px", background: danger ? "rgba(248,113,113,0.15)" : "linear-gradient(135deg,#c9a84c,#a07830)", border: danger ? "1px solid rgba(248,113,113,0.35)" : "none", borderRadius:8, color: danger ? "#f87171" : "#0a0a14", cursor:"pointer", fontSize:13, fontWeight:700, fontFamily:"'DM Sans',sans-serif" }}>{danger ? "Delete" : "Confirm"}</button>
                    </div>
                </div>
            </div>
        );
    }

    // ----------------------------------------------------------------------
    //  SUCCESS PAGE (identical, simplified)
    // ----------------------------------------------------------------------
    function SuccessPage({ job, profile, onHome }) {
        return (
            <div style={{ minHeight:"100vh", background:"#07070f", display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", fontFamily:"'DM Sans',sans-serif", padding:"24px 20px" }}>
                <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:44 }}>
                    <div style={{ width:32, height:32, borderRadius:8, background:"linear-gradient(135deg,#c9a84c,#8b6914)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800, color:"#07070f" }}>H</div>
                    <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:22, fontWeight:600, color:"#c9a84c", letterSpacing:3 }}>HIREHUB</span>
                </div>
                <div style={{ width:"100%", maxWidth:500 }}>
                    <div style={{ textAlign:"center", marginBottom:28 }}>
                        <div style={{ width:80, height:80, borderRadius:"50%", background:"linear-gradient(135deg,#14532d,#166534)", display:"flex", alignItems:"center", justifyContent:"center", margin:"0 auto 22px", boxShadow:"0 0 40px rgba(74,222,128,0.25)" }}>
                            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#4ade80" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>
                        </div>
                        <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:34, fontWeight:600, color:"#e8e0d0", margin:"0 0 8px" }}>Application Submitted!</h1>
                        <p style={{ color:"#4a4a6a", fontSize:14, margin:0 }}>We'll notify you when there's an update.</p>
                    </div>
                    <div style={{ background:"#0f0f1a", border:"1px solid #1e1e30", borderRadius:14, padding:"18px 20px", marginBottom:14 }}>
                        <div style={{ display:"flex", gap:14, alignItems:"center", marginBottom:14, paddingBottom:14, borderBottom:"1px solid #1a1a2e" }}>
                            <div style={{ width:46, height:46, borderRadius:11, background:job.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:15, fontWeight:800, color:"#fff", flexShrink:0 }}>{job.logo}</div>
                            <div><p style={{ margin:0, fontWeight:700, fontSize:15, color:"#e8e0d0" }}>{job.title}</p><p style={{ margin:"3px 0 0", fontSize:12, color:"#555" }}>{job.company} · {job.location}</p></div>
                            <div style={{ textAlign:"right", flexShrink:0 }}><p style={{ margin:0, fontSize:13, color:"#c9a84c", fontWeight:600 }}>{convertToLPA(job.salary)}</p><p style={{ margin:"3px 0 0", fontSize:10, color:"#3a3a5a" }}>{job.type}</p></div>
                        </div>
                        <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                            <div><p style={{ margin:"0 0 4px", fontSize:9, color:"#2a2a4a", textTransform:"uppercase" }}>Applied as</p><p style={{ margin:0, fontSize:13, color:"#c9c4bb", fontWeight:600 }}>{profile?.name}</p></div>
                            <div><p style={{ margin:"0 0 4px", fontSize:9, color:"#2a2a4a", textTransform:"uppercase" }}>Status</p><span style={{ display:"inline-flex", alignItems:"center", gap:5, background:"rgba(96,165,250,.12)", color:"#60a5fa", borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700 }}><span style={{ width:5, height:5, borderRadius:"50%", background:"#60a5fa" }}/>Applied</span></div>
                            <div><p style={{ margin:"0 0 4px", fontSize:9, color:"#2a2a4a", textTransform:"uppercase" }}>Date</p><p style={{ margin:0, fontSize:13, color:"#c9c4bb", fontWeight:600 }}>{new Date().toLocaleDateString("en-IN",{day:"numeric",month:"short",year:"numeric"})}</p></div>
                        </div>
                    </div>
                    <button style={{ ...S.btn, width:"100%", padding:"14px", fontSize:15 }} onClick={onHome}>← Back to All Jobs</button>
                </div>
            </div>
        );
    }

    // ----------------------------------------------------------------------
    //  AUTH PAGE (unchanged)
    // ----------------------------------------------------------------------
    function AuthPage({ onLogin }) { /* full auth logic - kept original but trimmed for brevity, but we keep it functional */
        const [mode, setMode] = useState("login");
        const [email, setEmail] = useState("");
        const [password, setPassword] = useState("");
        const [loading, setLoading] = useState(false);
        const [error, setError] = useState("");
        const handleLogin = async () => {
            setError(""); setLoading(true);
            try {
                const r = await fetch(`${API}/auth/login`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({email,password}) });
                const d = await r.json();
                if (!d.success) { setError(d.message); return; }
                localStorage.setItem("hh_token", d.token);
                localStorage.setItem("hh_user", JSON.stringify(d.user));
                onLogin(d.user, d.token);
            } catch { setError("Connection failed."); }
            finally { setLoading(false); }
        };
        return (
            <div style={{ minHeight:"100vh", background:"linear-gradient(135deg,#0a0a14,#13131f)", display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"'DM Sans',sans-serif" }}>
                <div style={{ width:"100%", maxWidth:400, padding:"0 20px" }}>
                    <div style={{ textAlign:"center", marginBottom:36 }}>
                        <h1 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:40, color:"#c9a84c", margin:"0 0 6px", letterSpacing:4 }}>HIREHUB</h1>
                        <p style={{ color:"#3a3a5a", fontSize:12, letterSpacing:3, textTransform:"uppercase" }}>Career Portal</p>
                    </div>
                    <div style={{ ...S.card, padding:"28px 24px" }}>
                        <div><label style={S.label}>Email</label><input style={S.input} type="email" placeholder="you@company.com" value={email} onChange={e=>setEmail(e.target.value)} /></div>
                        <div style={{ marginTop:14 }}><label style={S.label}>Password</label><PasswordInput value={password} onChange={e=>setPassword(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleLogin()} /></div>
                        {error && <p style={{ color:"#f87171", fontSize:13, margin:"12px 0 0" }}>⚠ {error}</p>}
                        <button style={{ ...S.btn, width:"100%", marginTop:20, padding:"13px" }} onClick={handleLogin} disabled={loading}>{loading ? "⟳ Please wait…" : "Sign In"}</button>
                    </div>
                </div>
            </div>
        );
    }

    // ----------------------------------------------------------------------
    //  ACCOUNT DROPDOWN (unchanged)
    // ----------------------------------------------------------------------
    function AccountDropdown({ user, onLogout, onAddAccount }) {
        const [open, setOpen] = useState(false);
        return (
            <div style={{ position:"relative" }}>
                <button onClick={()=>setOpen(o=>!o)} style={{ background:"none", border:"2px solid transparent", borderRadius:"50%", cursor:"pointer", padding:0, width:36, height:36, display:"flex", alignItems:"center", justifyContent:"center" }}>
                    {user.avatar ? <img src={user.avatar} alt={user.name} style={{ width:32, height:32, borderRadius:"50%", objectFit:"cover" }} /> : <div style={{ width:32, height:32, borderRadius:8, background:"linear-gradient(135deg,#c9a84c,#8b6914)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:13, fontWeight:700, color:"#0a0a14" }}>{user.name?.[0]?.toUpperCase()}</div>}
                </button>
                {open && (
                    <>
                        <div onClick={()=>setOpen(false)} style={{ position:"fixed", inset:0, zIndex:998 }} />
                        <div style={{ position:"absolute", top:44, right:0, zIndex:999, width:260, background:"#13131f", border:"1px solid #2a2a3e", borderRadius:14, boxShadow:"0 16px 48px rgba(0,0,0,0.6)", overflow:"hidden" }}>
                            <div style={{ padding:"14px 16px", borderBottom:"1px solid #1e1e30" }}>
                                <p style={{ fontSize:12, fontWeight:600, color:"#e8e0d0" }}>{user.name}</p>
                                <p style={{ fontSize:10, color:"#555" }}>{user.email}</p>
                            </div>
                            <div style={{ padding:"8px" }}>
                                <button onClick={()=>{setOpen(false); onAddAccount();}} style={{ width:"100%", padding:"8px 12px", background:"transparent", border:"none", borderRadius:6, cursor:"pointer", textAlign:"left", fontSize:13, color:"#9ca3af" }}>➕ Add account</button>
                                <button onClick={()=>{setOpen(false); window.location.href=`${API}/auth/google?prompt=select_account`;}} style={{ width:"100%", padding:"8px 12px", background:"transparent", border:"none", borderRadius:6, cursor:"pointer", textAlign:"left", fontSize:13, color:"#9ca3af" }}>🔄 Switch account</button>
                                <button onClick={()=>{setOpen(false); onLogout();}} style={{ width:"100%", padding:"8px 12px", background:"transparent", border:"none", borderRadius:6, cursor:"pointer", textAlign:"left", fontSize:13, color:"#f87171" }}>🚪 Sign out</button>
                            </div>
                        </div>
                    </>
                )}
            </div>
        );
    }

    // ----------------------------------------------------------------------
    //  MAIN APP (selects fixed everywhere)
    // ----------------------------------------------------------------------
    function App() {
        const savedUser = (()=>{ try { return JSON.parse(localStorage.getItem("hh_user")); } catch { return null; } })();
        const savedToken = localStorage.getItem("hh_token");
        const [user, setUser] = useState(savedUser);
        const [token, setToken] = useState(savedToken);

        useEffect(() => {
            const params = new URLSearchParams(window.location.search);
            const t = params.get("token");
            if (t) {
                fetch(`${API}/auth/google-success`, { method:"POST", headers:{"Content-Type":"application/json"}, body:JSON.stringify({token:t}) })
                    .then(r=>r.json()).then(d=>{
                        if(d.success){
                            localStorage.setItem("hh_token", d.token);
                            localStorage.setItem("hh_user", JSON.stringify(d.user));
                            setUser(d.user); setToken(d.token);
                            window.history.replaceState({}, document.title, "/");
                        }
                    }).catch(console.error);
            }
        }, []);

        const handleLogin = (u,t) => { setUser(u); setToken(t); };
        const handleLogout = () => { localStorage.removeItem("hh_token"); localStorage.removeItem("hh_user"); setUser(null); setToken(null); };
        const handleAddAccount = () => { localStorage.removeItem("hh_token"); localStorage.removeItem("hh_user"); localStorage.setItem("hh_auth_mode", "reg1"); setUser(null); setToken(null); };

        if (!user) return <AuthPage onLogin={handleLogin} />;
        // Simplified job portal with all selects fixed
        return (
            <div style={{ minHeight:"100vh", background:"#0a0a14", color:"#e8e0d0", fontFamily:"'DM Sans',sans-serif" }}>
                <div style={{ background:"#0f0f1a", borderBottom:"1px solid #2a2a3e", padding:"12px 24px", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                    <div style={{ display:"flex", alignItems:"center", gap:12 }}>
                        <div style={{ width:32, height:32, borderRadius:8, background:"linear-gradient(135deg,#c9a84c,#8b6914)", display:"flex", alignItems:"center", justifyContent:"center", fontSize:14, fontWeight:800, color:"#0a0a14" }}>H</div>
                        <span style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:20, fontWeight:600, color:"#c9a84c", letterSpacing:2 }}>HIREHUB</span>
                    </div>
                    <AccountDropdown user={user} onLogout={handleLogout} onAddAccount={handleAddAccount} />
                </div>
                <div style={{ padding:"32px", maxWidth:600, margin:"0 auto", textAlign:"center" }}>
                    <div style={{ ...S.card, padding:"32px" }}>
                        <h2>Welcome, {user.name} 👋</h2>
                        <p style={{ color:"#888", margin:"12px 0 24px" }}>Demo mode – all dropdowns have single clean arrow (no double icons).</p>
                        {/* EXAMPLE SELECT - no double arrow */}
                        <label style={S.label}>Filter jobs</label>
                        <select style={{ width:"100%", marginBottom:16 }}>
                            <option>All Jobs</option>
                            <option>Full-time</option>
                            <option>Remote</option>
                        </select>
                        <label style={S.label}>Sort by</label>
                        <select style={{ width:"100%" }}>
                            <option>Newest first</option>
                            <option>Match score</option>
                        </select>
                        <button style={{ ...S.btn, marginTop:24 }} onClick={handleLogout}>Sign out</button>
                    </div>
                    <p style={{ fontSize:12, color:"#2a2a4a", marginTop:20 }}></p>
                </div>
            </div>
        );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
</script>
</body>
</html>
